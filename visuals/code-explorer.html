<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Explorer — OPSL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--green:#22c55e;--orange:#f59e0b;--purple:#a855f7;--pink:#ec4899;--cyan:#06b6d4;--font:'Inter','Segoe UI',system-ui,sans-serif;--mono:'Cascadia Code','Fira Code',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{height:56px;background:rgba(10,14,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:24px;flex-shrink:0}
nav .logo{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:8px 12px;border-radius:6px;transition:all 0.2s}
nav a:hover,nav a.active{color:var(--text);background:rgba(59,130,246,0.1)}
main{flex:1;display:flex;overflow:hidden}
#sidebar{width:280px;min-width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
#sidebar-header input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none}
#sidebar-header input:focus{border-color:var(--accent)}
#file-list{flex:1;overflow-y:auto;padding:8px 0}
#file-list::-webkit-scrollbar{width:6px}
#file-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.file-item{padding:8px 16px;font-size:13px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px}
.file-item:hover{background:rgba(59,130,246,0.08)}
.file-item.active{background:rgba(59,130,246,0.15);color:var(--accent)}
.file-item .fi{font-size:14px}
.file-item .fname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-section{padding:6px 16px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:8px}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#code-header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:16px}
#code-header h2{font-size:16px;font-weight:600}
#code-header .desc{font-size:12px;color:var(--text2)}
#code-body{flex:1;overflow:auto;padding:16px 0}
#code-body::-webkit-scrollbar{width:8px}
#code-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#func-list{border-top:1px solid var(--border);max-height:200px;overflow-y:auto;padding:16px 24px;background:rgba(17,24,39,0.5)}
#func-list h3{font-size:13px;color:var(--accent);margin-bottom:8px}
.func-item{margin-bottom:8px}
.func-item h4{font-size:12px;color:var(--orange);font-family:var(--mono);margin-bottom:2px}
.func-item p{font-size:11px;color:var(--text2);line-height:1.5}
.code-line{display:flex;font-family:var(--mono);font-size:12px;line-height:1.7}
.code-line:hover{background:rgba(59,130,246,0.04)}
.ln{width:44px;text-align:right;padding-right:16px;color:var(--text2);user-select:none;flex-shrink:0;font-size:11px}
.lc{flex:1;white-space:pre;tab-size:2}
.kw{color:#ff7b72}.str{color:#a5d6ff}.cm{color:var(--text2);font-style:italic}.fn{color:#d2a8ff}.num{color:#79c0ff}
#empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px}
</style>
</head>
<body>
<nav>
  <div class="logo">⬡ OPSL Docs</div>
  <a href="index.html">Home</a>
  <a href="architecture.html">Architecture Graph</a>
  <a href="data-flow.html">Data Flow</a>
  <a href="concepts.html">Concepts</a>
  <a href="code-explorer.html" class="active">Code Explorer</a>
  <a href="file-tree.html">File Tree</a>
</nav>
<main>
  <div id="sidebar">
    <div id="sidebar-header"><input type="text" placeholder="Search files..." oninput="filterFiles(this.value)"></div>
    <div id="file-list"></div>
  </div>
  <div id="content">
    <div id="empty">← Select a file to see its code</div>
    <div id="code_header" style="display:none"><h2 id="ch-name"></h2><span class="desc" id="ch-desc"></span></div>
    <div id="code_body" style="display:none"></div>
    <div id="func-list" style="display:none"><h3>Functions</h3><div id="funcs"></div></div>
  </div>
</main>
<script>
var CODE = {
"parser.js":{desc:"Parses OPSL lines into objects",cat:"Core",
  funcs:{"parseLine(line)":"Checks if line starts with IMPORT/ASSIGN/VARIABLE/CALL, splits it, returns an object.","splitBy(text, ...replacements)":"Replaces each delimiter with '|', then splits. Core parsing utility."},
  code:`function parseLine(lineInput)
{
    let instruction = {};
    let trimmed = lineInput.trim();

    if(trimmed.startsWith("IMPORT "))
    {
        let splitLine = splitBy(trimmed, " ", "[", "]");
        let lang = splitLine[2];
        let library = splitLine[4];
        instruction = {"type" : "IMPORT", "lang" : lang, "library" : library};
    }
    if(trimmed.startsWith("ASSIGN "))
    {
        let splitLine = splitBy(trimmed, " = ", ".", " ");
        let library = splitLine[1];
        let name = splitLine[2];
        let libraryValue = splitLine[3];
        let variableValue = splitLine[4];
        instruction = {"type" : "ASSIGN", "library" : library, "name" : name, "libraryValue" : libraryValue, "variableValue" : variableValue};
    }
    if(trimmed.startsWith("VARIABLE "))
    {
        let parts = splitBy(trimmed, " = ");
        let leftSide = parts[0];
        let rightSide = parts[1];
        let leftParts = splitBy(leftSide, "VARIABLE ", ".");
        let library = leftParts[1];
        let name = leftParts[2];
        let valueParts = splitBy(rightSide, '"');
        let value = valueParts[1];
        instruction = {"type" : "VARIABLE", "library" : library, "name" : name, "value" : value};
    }
    if(trimmed.startsWith("CALL "))
    {
        let splitLine = splitBy(trimmed, ".", " ");
        let library = splitLine[1];
        let name = splitLine[2];
        instruction = {"type" : "CALL", "library" : library, "name" : name};
    }
    return instruction;
}

function splitBy(text, ...replacements) {
    for (let i = 0; i < replacements.length; i++) {
        text = text.replaceAll(replacements[i], "|");
    }
    return text.split("|");
}

module.exports = { parseLine };`},

"tcp-workers.js":{desc:"Persistent TCP socket + library process spawning",cat:"Core",
  funcs:{"getRuntimeSocket()":"Lazy initializer — creates TCP connection once, reuses forever.","handleIncomingData(chunk)":"Buffers TCP data, splits on newlines, resolves matching requests.","sendRuntimeRequest(name, action, key, value)":"Sends id:name:action:key:value over persistent socket, returns Promise.","createWorker(lang, name, file)":"Creates worker object; for JS libs spawns 'node file.js' process.","setupOutput(worker)":"Listens to stdout for 'loaded and registered' ready signal.","setVariable/getVariable/executeFunction":"Thin wrappers around sendRuntimeRequest.","closeWorker(worker)":"Kills the library child process."},
  code:`const { spawn, execSync } = require('child_process');
const net = require('net');

var SERVER_PORT = 3000;
var START_PORT = 4000;
var READY_TIMEOUT = 5000;
var READY_MARKER = 'loaded and registered';

var runtimeSocket = null;
var socketBuffer = '';
var pendingRequests = {};
var nextRequestId = 0;

function getRuntimeSocket() {
    if (runtimeSocket) return Promise.resolve(runtimeSocket);
    return new Promise(function (resolve, reject) {
        runtimeSocket = net.connect(SERVER_PORT, function () { resolve(runtimeSocket); });
        runtimeSocket.on('data', handleIncomingData);
        runtimeSocket.on('error', handleSocketError);
    });
}

function handleIncomingData(chunk) {
    socketBuffer += chunk.toString();
    var lines = socketBuffer.split('\\n');
    socketBuffer = lines.pop() || '';
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.trim()) continue;
        var ci = line.indexOf(':');
        if (ci === -1) continue;
        var id = line.substring(0, ci);
        var data = line.substring(ci + 1);
        if (pendingRequests[id]) { pendingRequests[id](data); delete pendingRequests[id]; }
    }
}

function sendRuntimeRequest(name, action, key, value) {
    return new Promise(function (resolve) {
        getRuntimeSocket().then(function (socket) {
            var id = String(++nextRequestId);
            pendingRequests[id] = resolve;
            var msg = id + ':' + name + ':' + action + ':' + key;
            if (value !== undefined) msg += ':' + value;
            socket.write(msg + '\\n');
        });
    });
}

var nextPort = START_PORT;

function createWorker(language, libraryName, libraryFile) {
    var port = nextPort++;
    var worker = { language, libraryName, libraryFile, port, originalLang: null, childProcess: null };
    if (language === 'opsl') worker.originalLang = 'opsl';
    if (language === 'js' && libraryFile) return createJSWorker(worker);
    return Promise.resolve(worker);
}

function createJSWorker(worker) {
    killPort(worker.port);
    worker.childProcess = spawn('node', [worker.libraryFile], { stdio: ['pipe','pipe','pipe'] });
    setupOutput(worker);
    return new Promise(function (resolve) {
        var ready = new Promise(function (r) { worker.onReady = r; });
        var timeout = new Promise(function (r) { setTimeout(r, READY_TIMEOUT); });
        Promise.race([ready, timeout]).then(function() { resolve(worker); });
    });
}

function killPort(port) { try { execSync('fuser -k '+port+'/tcp 2>/dev/null',{stdio:'pipe'}); } catch(e){} }

function setupOutput(worker) {
    var buf = '';
    worker.childProcess.stdout.on('data', function(d) {
        buf += d.toString();
        console.log('['+worker.libraryName+'] '+d.toString().trim());
        if (buf.indexOf(READY_MARKER)!==-1 && worker.onReady) { worker.onReady(); worker.onReady=null; }
    });
    worker.childProcess.stderr.on('data', function(d) { console.error('['+worker.libraryName+' error] '+d.toString().trim()); });
}

function setVariable(w, name, value) { return sendRuntimeRequest(w.libraryName,'set',name,value); }
function getVariable(w, name) { return sendRuntimeRequest(w.libraryName,'get',name); }
function executeFunction(w, name) { return sendRuntimeRequest(w.libraryName,'call',w.libraryName,name+':'); }
function closeWorker(w) { if(w.childProcess) w.childProcess.kill(); }

module.exports = { createWorker, setVariable, getVariable, executeFunction, closeWorker };`}
};

var fileList = document.getElementById('file-list');
var sections = {};

function buildFileList() {
  for (var key in CODE) {
    var cat = CODE[key].cat;
    if (!sections[cat]) {
      sections[cat] = document.createElement('div');
      sections[cat].className = 'file-section';
      sections[cat].textContent = cat;
      fileList.appendChild(sections[cat]);
    }
    var item = document.createElement('div');
    item.className = 'file-item';
    item.setAttribute('data-key', key);
    item.innerHTML = '<span class="fi">📄</span><span class="fname">'+key+'</span>';
    item.addEventListener('click', function() { showFile(this.getAttribute('data-key')); });
    sections[cat].appendChild(item);
  }
}

function showFile(key) {
  var file = CODE[key];
  if (!file) return;

  document.querySelectorAll('.file-item.active').forEach(function(el){el.classList.remove('active')});
  document.querySelector('[data-key="'+key+'"]').classList.add('active');

  document.getElementById('empty').style.display = 'none';
  document.getElementById('code_header').style.display = 'flex';
  document.getElementById('code_body').style.display = 'block';
  document.getElementById('func-list').style.display = 'block';

  document.getElementById('ch-name').textContent = key;
  document.getElementById('ch-desc').textContent = file.desc;

  var lines = file.code.split('\n');
  var body = document.getElementById('code_body');
  body.innerHTML = '';
  lines.forEach(function(line, i) {
    var div = document.createElement('div');
    div.className = 'code-line';
    div.innerHTML = '<span class="ln">'+(i+1)+'</span><span class="lc">'+highlight(line)+'</span>';
    body.appendChild(div);
  });

  var funcs = document.getElementById('funcs');
  funcs.innerHTML = '';
  for (var fn in file.funcs) {
    var d = document.createElement('div');
    d.className = 'func-item';
    d.innerHTML = '<h4>'+fn+'</h4><p>'+file.funcs[fn]+'</p>';
    funcs.appendChild(d);
  }
}

function highlight(code) {
  return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*)/g,'<span class="cm">$1</span>')
    .replace(/('.*?'|".*?")/g,'<span class="str">$1</span>')
    .replace(/\b(const|let|var|function|async|await|return|if|else|for|while|new|this|module|exports|require)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}

function filterFiles(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.file-item').forEach(function(el) {
    el.style.display = el.getAttribute('data-key').toLowerCase().indexOf(q) === -1 ? 'none' : '';
  });
}

buildFileList();
</script>
</body>
</html>
