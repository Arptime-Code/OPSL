<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Flow — OPSL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--green:#22c55e;--orange:#f59e0b;--purple:#a855f7;--pink:#ec4899;--font:'Inter','Segoe UI',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{height:56px;background:rgba(10,14,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:24px;flex-shrink:0}
nav .logo{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:8px 12px;border-radius:6px;transition:all 0.2s}
nav a:hover,nav a.active{color:var(--text);background:rgba(59,130,246,0.1)}
main{flex:1;padding:48px 32px;max-width:900px;margin:0 auto}
h1{font-size:28px;margin-bottom:8px}
.subtitle{color:var(--text2);margin-bottom:40px;font-size:14px}
.flow-selector{display:flex;gap:12px;margin-bottom:40px;flex-wrap:wrap}
.flow-btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.2s}
.flow-btn:hover{border-color:var(--accent);color:var(--text)}
.flow-btn.active{background:rgba(59,130,246,0.15);border-color:var(--accent);color:var(--accent);font-weight:600}
.step{display:flex;gap:24px;margin-bottom:0;opacity:0.3;transition:opacity 0.4s;position:relative}
.step.active{opacity:1}
.step-num{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;position:relative;z-index:2}
.step.active .step-num{box-shadow:0 0 20px rgba(59,130,246,0.3)}
.step-content{flex:1;padding-bottom:32px;border-left:2px solid var(--border);padding-left:24px;margin-left:24px}
.step:last-child .step-content{border-left-color:transparent}
.step-content h3{font-size:16px;margin-bottom:6px}
.step-content p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}
.code-block{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre;color:#e6edf3}
.code-block .kw{color:#ff7b72}.code-block .str{color:#a5d6ff}.code-block .cm{color:#8b949e;font-style:italic}.code-block .fn{color:#d2a8ff}.code-block .num{color:#79c0ff}
.note{background:rgba(59,130,246,0.1);border-left:3px solid var(--accent);padding:12px 16px;border-radius:0 8px 8px 0;font-size:12px;color:var(--text2);line-height:1.6}
.note strong{color:var(--accent)}
.step-connector{position:absolute;left:24px;top:48px;bottom:0;width:2px;background:var(--border)}
</style>
</head>
<body>
<nav>
  <div class="logo">⬡ OPSL Docs</div>
  <a href="index.html">Home</a>
  <a href="architecture.html">Architecture Graph</a>
  <a href="data-flow.html" class="active">Data Flow</a>
  <a href="concepts.html">Concepts</a>
  <a href="code-explorer.html">Code Explorer</a>
  <a href="file-tree.html">File Tree</a>
</nav>
<main>
  <h1>Data Flow</h1>
  <p class="subtitle">Follow a single OPSL instruction from your text file to actual execution. Pick a flow to trace:</p>

  <div class="flow-selector">
    <div class="flow-btn active" onclick="showFlow('import')">IMPORT</div>
    <div class="flow-btn" onclick="showFlow('variable')">VARIABLE</div>
    <div class="flow-btn" onclick="showFlow('assign')">ASSIGN</div>
    <div class="flow-btn" onclick="showFlow('call')">CALL</div>
  </div>

  <div id="flow-container"></div>
</main>

<script>
var FLOWS = {
  import: {
    example: 'IMPORT [js] test',
    steps: [
      {title:"You write the instruction",desc:"In your .opsl file, you type an IMPORT instruction telling OPSL to load a JavaScript library called 'test'.",
       code:'IMPORT [js] test',color:'#a855f7'},
      {title:"runtime-tcp.js reads the file",desc:"main.js reads the entire .opsl file as a string, creates a Runtime instance, and calls processOPSLString().",
       code:'var fileString = fs.readFileSync(inputFile, "utf8");\nvar runtime = new Runtime(inputFile);\nawait runtime.processOPSLString(fileString);',color:'#3b82f6'},
      {title:"parser.js parses the line",desc:"Each line is passed to parseLine(). It detects 'IMPORT', splits by spaces and brackets, and returns a structured object.",
       code:'// parser.js\ninstruction = {\n  type: "IMPORT",\n  lang: "js",\n  library: "test"\n};',color:'#3b82f6'},
      {title:"Runtime dispatches to handleImport()",desc:"The switch statement in processOPSLString() matches 'IMPORT' and calls handleImport() in instruction-handler.js.",
       code:'case "IMPORT":\n  await this.handleImport(instruction);\n  break;',color:'#3b82f6'},
      {title:"Library file is located",desc:"library-loader.js searches for 'test.js' — first in project root, then in opsl-local/test/test.js. Found!",
       code:'// Searched:\n//   project/test.js          ← not found\n//   opsl-local/test/test.js  ← found!',color:'#f59e0b'},
      {title:"tcp-workers.js spawns the process",desc:"createWorker() kills any old process on port 4001, then spawns: node opsl-local/test/test.js",
       code:'spawn("node", ["opsl-local/test/test.js"], {\n  stdio: ["pipe", "pipe", "pipe"]\n});',color:'#3b82f6'},
      {title:"Library initializes itself",desc:"The library file runs independently. It requires TCPClient, connects to port 3000, registers its functions, and prints 'loaded and registered'.",
       code:'// Inside test.js\nconst TCPClient = require("tcp-server-v3/client");\nawait TCPClient.init("test", 4001);\nawait TCPClient.registerFunction("sayHello", sayHello);\nconsole.log("loaded and registered");',color:'#f59e0b'},
      {title:"Runtime detects ready signal",desc:"tcp-workers.js reads the library's stdout. When it sees 'loaded and registered', it resolves the ready promise.",
       code:'worker.childProcess.stdout.on("data", function(d) {\n  if (d.indexOf("loaded and registered") !== -1) {\n    worker.onReady();\n  }\n});',color:'#3b82f6'},
      {title:"Library registered ✓",desc:"The worker object is stored in globalLibraries. The library is now a TCP client connected to the server with its functions registered. Ready for the next instruction.",
       code:'globalLibraries["test"] = worker;\nruntime.importedLibraries["test"] = true;',color:'#22c55e'}
    ]
  },
  variable: {
    example: 'VARIABLE test.myVar = "hello"',
    steps: [
      {title:"You write the instruction",desc:"You want to set a variable 'myVar' in the 'test' library to the string 'hello'.",
       code:'VARIABLE test.myVar = "hello"',color:'#a855f7'},
      {title:"parser.js extracts components",desc:"Splits by ' = ' to get left/right, then splits left by '.' to get library and name, splits right by quotes to get value.",
       code:'instruction = {\n  type: "VARIABLE",\n  library: "test",\n  name: "myVar",\n  value: "hello"\n};',color:'#3b82f6'},
      {title:"handleVariable() is called",desc:"instruction-handler.js checks that 'test' is imported, gets the worker, and calls tcpWorkerLib.setVariable().",
       code:'var worker = globalLibraries["test"];\nawait tcpWorkerLib.setVariable(worker, "myVar", "hello");',color:'#3b82f6'},
      {title:"TCP message is sent",desc:"sendRuntimeRequest() sends through the persistent socket: '5:test:set:myVar:hello'",
       code:'// Sent over TCP socket:\n5:test:set:myVar:hello\\n',color:'#3b82f6'},
      {title:"TCP server stores the variable",desc:"server/handler.js receives it, looks up the 'test' client, and stores: client.values['myVar'] = 'hello'",
       code:'// server/handler.js\nclient.values["myVar"] = "hello";\nrespond(socket, "5", "ok");',color:'#22c55e'},
      {title:"Response resolves the promise",desc:"The runtime's socket receives '5:ok', matches ID 5 to the pending request, and resolves the promise. The await completes.",
       code:'// In handleIncomingData:\npendingRequests["5"]("ok");\ndelete pendingRequests["5"];',color:'#22c55e'}
    ]
  },
  assign: {
    example: 'ASSIGN test.result = add.output',
    steps: [
      {title:"You write the instruction",desc:"Copy the 'output' variable from the 'add' library into the 'result' variable of the 'test' library.",
       code:'ASSIGN test.result = add.output',color:'#a855f7'},
      {title:"parser.js creates the object",desc:"Splits by ' = ', '.', and spaces to extract all four parts.",
       code:'instruction = {\n  type: "ASSIGN",\n  library: "test",\n  name: "result",\n  libraryValue: "add",\n  variableValue: "output"\n};',color:'#3b82f6'},
      {title:"handleAssign() reads source value",desc:"First, get 'output' from the 'add' library via TCP. The TCP server returns add.values['output'].",
       code:'var value = await tcpWorkerLib.getVariable(\n  globalLibraries["add"], "output"\n);\n// value = "42"',color:'#3b82f6'},
      {title:"TCP GET request",desc:"Runtime sends '6:add:get:output' over the persistent socket. Server responds with the stored value.",
       code:'// Request:  6:add:get:output\n// Response: 6:42',color:'#3b82f6'},
      {title:"handleAssign() writes target value",desc:"Now set 'result' in 'test' library to the value we just got.",
       code:'await tcpWorkerLib.setVariable(\n  globalLibraries["test"], "result", "42"\n);',color:'#3b82f6'},
      {title:"TCP SET request",desc:"Runtime sends '7:test:set:result:42'. Server stores test.values['result'] = '42'. Variable copied across libraries! ✓",
       code:'// Request:  7:test:set:result:42\n// Response: 7:ok\n// Now test.result === "42"',color:'#22c55e'}
    ]
  },
  call: {
    example: 'CALL test.sayHello',
    steps: [
      {title:"You write the instruction",desc:"Call the 'sayHello' function in the 'test' library.",
       code:'CALL test.sayHello',color:'#a855f7'},
      {title:"parser.js parses it",desc:"Splits by '.' and space to get library and function name.",
       code:'instruction = {\n  type: "CALL",\n  library: "test",\n  name: "sayHello"\n};',color:'#3b82f6'},
      {title:"handleCall() checks type",desc:"Is it 'opsl'? No, it's 'js'. So it's not a nested .opsl file and not a special function like functionCall or consoleLog.",
       code:'if (worker.originalLang === "opsl") {\n  // nested OPSL\n} else {\n  // TCP function call ← we go here\n}',color:'#3b82f6'},
      {title:"executeFunction() sends TCP call",desc:"sendRuntimeRequest() sends a 'call' action to the TCP server, routing to the 'test' library.",
       code:'// Request:  8:test:call:test:sayHello:\n// The server routes this to test\'s local server (port 4002)',color:'#3b82f6'},
      {title:"Server routes to library's local server",desc:"server/remote-call.js looks up 'test' in the registry, finds port 4002, connects to it, and sends 'call:sayHello:'",
       code:'// server/remote-call.js\nvar conn = net.connect(4002);\nconn.write("call:sayHello:\\n");',color:'#22c55e'},
      {title:"Library executes the function",desc:"test.js has registered sayHello. Its local server receives the call, executes the function, and writes the result back.",
       code:'// Inside test.js\nfunction sayHello() {\n  console.log("Hello!");\n  return "hello executed";\n}',color:'#f59e0b'},
      {title:"Result flows back through TCP",desc:"Result travels: library local server → TCP server → runtime persistent socket → resolves the original await.",
       code:'// Response chain:\n// test:4002 → server:3000 → runtime socket\n// "hello executed" returned to runtime',color:'#22c55e'}
    ]
  }
};

var currentFlow = 'import';

function showFlow(key) {
  currentFlow = key;
  document.querySelectorAll('.flow-btn').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');

  var flow = FLOWS[key];
  var container = document.getElementById('flow-container');
  container.innerHTML = '';

  // Example header
  var ex = document.createElement('div');
  ex.style.cssText = 'margin-bottom:32px;padding:16px 20px;background:var(--card);border-radius:8px;border:1px solid var(--border)';
  ex.innerHTML = '<div style="font-size:11px;color:var(--text2);margin-bottom:6px">EXAMPLE INSTRUCTION</div><div style="font-family:monospace;font-size:14px;color:var(--accent)">' + flow.example + '</div>';
  container.appendChild(ex);

  flow.steps.forEach(function(step, i) {
    var div = document.createElement('div');
    div.className = 'step';
    div.id = 'step-' + i;

    div.innerHTML = '<div class="step-num" style="background:'+step.color+'22;color:'+step.color+'">'+(i+1)+'</div>' +
      '<div class="step-content">' +
      '<h3 style="color:'+step.color+'">'+step.title+'</h3>' +
      '<p>'+step.desc+'</p>' +
      '<div class="code-block">' + escapeHtml(step.code) + '</div>' +
      '</div>';

    container.appendChild(div);
  });

  // Animate steps
  var steps = container.querySelectorAll('.step');
  steps.forEach(function(s, i) {
    setTimeout(function() { s.classList.add('active'); }, i * 300);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\b(await|const|let|var|function|async|return|if|else|new|break)\b/g,'<span class="kw">$1</span>')
    .replace(/(".*?")/g,'<span class="str">$1</span>')
    .replace(/(\/\/.*)/g,'<span class="cm">$1</span>');
}

showFlow('import');
</script>
</body>
</html>
