<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Tree — OPSL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;--green:#22c55e;--orange:#f59e0b;--purple:#a855f7;--pink:#ec4899;--font:'Inter','Segoe UI',system-ui,sans-serif;--mono:'Cascadia Code','Fira Code',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{height:56px;background:rgba(10,14,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:24px;flex-shrink:0}
nav .logo{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;padding:8px 12px;border-radius:6px;transition:all 0.2s}
nav a:hover,nav a.active{color:var(--text);background:rgba(59,130,246,0.1)}
main{flex:1;display:flex;overflow:hidden}
#tree-panel{width:320px;min-width:260px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0}
#tree-panel::-webkit-scrollbar{width:6px}
#tree-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#preview-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
#preview-header .name{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:500}
#preview-header .desc{font-size:12px;color:var(--text2);margin-left:auto}
#preview-body{flex:1;overflow:auto;padding:16px 0}
#preview-body::-webkit-scrollbar{width:8px}
#preview-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#preview-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px}
.tree-node{cursor:pointer}
.tree-label{display:flex;align-items:center;padding:4px 12px 4px 16px;font-size:13px;transition:background 0.15s;margin:0 8px;border-radius:4px}
.tree-label:hover{background:rgba(59,130,246,0.08)}
.tree-label.active{background:rgba(59,130,246,0.15);color:var(--accent)}
.tree-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text2);transition:transform 0.2s;flex-shrink:0}
.tree-arrow.open{transform:rotate(90deg)}
.tree-arrow.leaf{visibility:hidden}
.tree-icon{margin-right:6px;font-size:13px;flex-shrink:0}
.tree-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-children{display:none;margin-left:12px;border-left:1px solid var(--border);padding-left:4px}
.tree-children.open{display:block}
.code-line{display:flex;font-family:var(--mono);font-size:12px;line-height:1.7}
.code-line:hover{background:rgba(59,130,246,0.04)}
.ln{width:44px;text-align:right;padding-right:16px;color:var(--text2);user-select:none;flex-shrink:0;font-size:11px}
.lc{flex:1;white-space:pre;tab-size:2}
.kw{color:#ff7b72}.str{color:#a5d6ff}.cm{color:var(--text2);font-style:italic}.fn{color:#d2a8ff}.num{color:#79c0ff}
</style>
</head>
<body>
<nav>
  <div class="logo">⬡ OPSL Docs</div>
  <a href="index.html">Home</a>
  <a href="architecture.html">Architecture Graph</a>
  <a href="data-flow.html">Data Flow</a>
  <a href="concepts.html">Concepts</a>
  <a href="code-explorer.html">Code Explorer</a>
  <a href="file-tree.html" class="active">File Tree</a>
</nav>
<main>
  <div id="tree-panel"></div>
  <div id="preview-panel">
    <div id="preview-header" style="display:none"><span class="name" id="ph-name"></span><span class="desc" id="ph-desc"></span></div>
    <div id="preview-body"></div>
    <div id="preview-empty">🌳 Hover or click a file to preview its code</div>
  </div>
</main>
<script>

var FILE_CODE = {
  "parser.js": `function parseLine(lineInput) {
    let instruction = {};
    let trimmed = lineInput.trim();
    if(trimmed.startsWith("IMPORT ")) {
        let splitLine = splitBy(trimmed, " ", "[", "]");
        instruction = {"type":"IMPORT","lang":splitLine[2],"library":splitLine[4]};
    }
    if(trimmed.startsWith("ASSIGN ")) {
        let splitLine = splitBy(trimmed, " = ", ".", " ");
        instruction = {"type":"ASSIGN","library":splitLine[1],"name":splitLine[2],
            "libraryValue":splitLine[3],"variableValue":splitLine[4]};
    }
    if(trimmed.startsWith("VARIABLE ")) {
        let parts = splitBy(trimmed, " = ");
        let leftParts = splitBy(parts[0], "VARIABLE ", ".");
        let valueParts = splitBy(parts[1], '"');
        instruction = {"type":"VARIABLE","library":leftParts[1],"name":leftParts[2],"value":valueParts[1]};
    }
    if(trimmed.startsWith("CALL ")) {
        let splitLine = splitBy(trimmed, ".", " ");
        instruction = {"type":"CALL","library":splitLine[1],"name":splitLine[2]};
    }
    return instruction;
}
function splitBy(text, ...replacements) {
    for (let i = 0; i < replacements.length; i++)
        text = text.replaceAll(replacements[i], "|");
    return text.split("|");
}
module.exports = { parseLine };`,

  "tcp-workers.js": `const { spawn, execSync } = require('child_process');
const net = require('net');
var SERVER_PORT = 3000, START_PORT = 4000;
var READY_TIMEOUT = 5000, READY_MARKER = 'loaded and registered';
var runtimeSocket = null, socketBuffer = '';
var pendingRequests = {}, nextRequestId = 0;

function getRuntimeSocket() {
    if (runtimeSocket) return Promise.resolve(runtimeSocket);
    return new Promise(function(resolve) {
        runtimeSocket = net.connect(SERVER_PORT, function(){resolve(runtimeSocket);});
        runtimeSocket.on('data', handleIncomingData);
        runtimeSocket.on('error', function(){runtimeSocket=null;});
    });
}
function handleIncomingData(chunk) {
    socketBuffer += chunk.toString();
    var lines = socketBuffer.split('\\n');
    socketBuffer = lines.pop() || '';
    for (var i=0;i<lines.length;i++) {
        var ci=lines[i].indexOf(':'); if(ci===-1) continue;
        var id=lines[i].substring(0,ci), data=lines[i].substring(ci+1);
        if(pendingRequests[id]){pendingRequests[id](data);delete pendingRequests[id];}
    }
}
function sendRuntimeRequest(name,action,key,value) {
    return new Promise(function(resolve){
        getRuntimeSocket().then(function(socket){
            var id=String(++nextRequestId); pendingRequests[id]=resolve;
            var msg=id+':'+name+':'+action+':'+key;
            if(value!==undefined) msg+=':'+value;
            socket.write(msg+'\\n');
        });
    });
}
function createWorker(lang,name,file) {
    var port=nextPort++, w={language:lang,libraryName:name,libraryFile:file,port:port,originalLang:null,childProcess:null};
    if(lang==='opsl') w.originalLang='opsl';
    if(lang==='js'&&file) return createJSWorker(w);
    return Promise.resolve(w);
}
function createJSWorker(w) {
    try{execSync('fuser -k '+w.port+'/tcp 2>/dev/null',{stdio:'pipe'});}catch(e){}
    w.childProcess=spawn('node',[w.libraryFile],{stdio:['pipe','pipe','pipe']});
    setupOutput(w);
    return new Promise(function(resolve){
        var r1=new Promise(function(r){w.onReady=r;}),
            r2=new Promise(function(r){setTimeout(r,READY_TIMEOUT);});
        Promise.race([r1,r2]).then(function(){resolve(w);});
    });
}
function setupOutput(w) {
    var buf='';
    w.childProcess.stdout.on('data',function(d){
        buf+=d.toString();
        console.log('['+w.libraryName+'] '+d.toString().trim());
        if(buf.indexOf(READY_MARKER)!==-1&&w.onReady){w.onReady();w.onReady=null;}
    });
    w.childProcess.stderr.on('data',function(d){console.error('['+w.libraryName+' error] '+d.toString().trim());});
}
function setVariable(w,n,v){return sendRuntimeRequest(w.libraryName,'set',n,v);}
function getVariable(w,n){return sendRuntimeRequest(w.libraryName,'get',n);}
function executeFunction(w,n){return sendRuntimeRequest(w.libraryName,'call',w.libraryName,n+':');}
function closeWorker(w){if(w.childProcess)w.childProcess.kill();}
module.exports={createWorker,setVariable,getVariable,executeFunction,closeWorker};`
};

// Build tree AFTER FILE_CODE is defined
var TREE = {
  name:"OPSL Project",type:"folder",children:[
    {name:"parser.js",type:"file",key:"parser.js",code:FILE_CODE["parser.js"]},
    {name:"tcp-workers.js",type:"file",key:"tcp-workers.js",code:FILE_CODE["tcp-workers.js"]},
    {name:"runtimeTCP/",type:"folder",children:[
      {name:"main.js",type:"file"},
      {name:"runtime.js",type:"file"},
      {name:"server-manager.js",type:"file"},
      {name:"library-loader.js",type:"file"},
      {name:"instruction-handler.js",type:"file"},
      {name:"opsl-executor.js",type:"file"},
      {name:"cleanup.js",type:"file"},
    ]},
    {name:"tcp-server-v3/",type:"folder",children:[
      {name:"server/",type:"folder",children:[
        {name:"index.js",type:"file"},{name:"handler.js",type:"file"},{name:"parser.js",type:"file"},
        {name:"client-registry.js",type:"file"},{name:"protocol.js",type:"file"},{name:"remote-call.js",type:"file"},
      ]},
      {name:"client/",type:"folder",children:[
        {name:"api.js",type:"file"},{name:"connection.js",type:"file"},{name:"local-server.js",type:"file"},
        {name:"protocol.js",type:"file"},{name:"responses.js",type:"file"},{name:"index.js",type:"file"},
      ]}
    ]},
    {name:"native-library/",type:"folder",children:[
      {name:"library.js",type:"file"},
    ]},
    {name:"allTests/",type:"folder",children:[
      {name:"LoopTest/",type:"folder"},{name:"LoopTest2/",type:"folder"},
      {name:"testing/",type:"folder"},{name:"testing2/",type:"folder"},{name:"testing3/",type:"folder"},
    ]},
    {name:"oldFiles/",type:"folder",children:[
      {name:"workers.js",type:"file"},{name:"runtime.js",type:"file"},{name:"server.js",type:"file"},
      {name:"client.js",type:"file"},
    ]}
  ]
};

var treePanel = document.getElementById('tree-panel');
var previewEmpty = document.getElementById('preview-empty');
var previewHeader = document.getElementById('preview-header');
var previewBody = document.getElementById('preview-body');

function buildTree(node, parent) {
  var div = document.createElement('div');
  div.className = 'tree-node';
  var label = document.createElement('div');
  label.className = 'tree-label';

  var arrow = document.createElement('span');
  arrow.className = 'tree-arrow' + (node.type==='folder'?'':' leaf');
  arrow.textContent = '▶';
  label.appendChild(arrow);

  var icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.textContent = node.type==='folder'?'📁':(node.name.endsWith('.js')?'🟨':(node.name.endsWith('.opsl')?'🟧':'📄'));
  label.appendChild(icon);

  var nameEl = document.createElement('span');
  nameEl.className = 'tree-name';
  nameEl.textContent = node.name;
  label.appendChild(nameEl);
  div.appendChild(label);

  if (node.type==='folder' && node.children) {
    var childDiv = document.createElement('div');
    childDiv.className = 'tree-children';
    node.children.forEach(function(c){buildTree(c, childDiv);});
    div.appendChild(childDiv);
    label.addEventListener('click', function(){childDiv.classList.toggle('open');arrow.classList.toggle('open');});
  }

  if (node.type==='file' && node.code) {
    label.addEventListener('mouseenter', function(){previewCode(node.code, node.name);});
    label.addEventListener('click', function(e){
      e.stopPropagation();
      document.querySelectorAll('.tree-label.active').forEach(function(el){el.classList.remove('active');});
      label.classList.add('active');
      previewCode(node.code, node.name);
    });
  }

  parent.appendChild(div);
}

function previewCode(code, name) {
  previewEmpty.style.display='none';
  previewHeader.style.display='flex';
  document.getElementById('ph-name').textContent = name;
  document.getElementById('ph-desc').textContent = 'Source code preview';

  var lines = code.split('\n');
  previewBody.innerHTML = '';
  lines.forEach(function(line,i){
    var d = document.createElement('div');
    d.className = 'code-line';
    d.innerHTML = '<span class="ln">'+(i+1)+'</span><span class="lc">'+highlight(line)+'</span>';
    previewBody.appendChild(d);
  });
}

function highlight(c) {
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*)/g,'<span class="cm">$1</span>').replace(/('.*?'|".*?")/g,'<span class="str">$1</span>')
    .replace(/\b(const|let|var|function|async|await|return|if|else|for|while|new|this|module|exports|require|switch|case|break|try|catch)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}

buildTree(TREE, treePanel);
document.querySelectorAll('.tree-children').forEach(function(el){el.classList.add('open');});
document.querySelectorAll('.tree-arrow:not(.leaf)').forEach(function(el){el.classList.add('open');});
</script>
</body>
</html>
